<!-- ============================================================
  INFOFRANKRIJK — Ouder worden in Frankrijk: het complete dossier
  WordPress/Divi-klare versie V1.0 — DEEL 2 VAN 2
  JavaScript: DossierFrankrijk integratie, PDF, premium-functies
  
  Plak dit direct na deel 1.
============================================================ -->

<!-- jsPDF voor PDF-export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function() {
  'use strict';
  
  // ===== SECTIE METADATA =====
  var SECTIONS = [
    { id: '1', title: '1. Waarom dit dossier — en waarom op tijd beginnen' },
    { id: '2', title: '2. Het Franse ouderenzorgstelsel in vogelvlucht' },
    { id: '3', title: '3. De sleutelbegrippen: APA, GIR, CLIC, EHPAD' },
    { id: '4', title: '4. Waar vind ik hulp: CLIC, mairie, CCAS' },
    { id: '5', title: '5. Hulp aan huis: aide ménagère, auxiliaire de vie' },
    { id: '6', title: '6. Verpleging aan huis: SSIAD en HAD' },
    { id: '7', title: '7. Hulpmiddelen en woningaanpassing' },
    { id: '8', title: '8. Mantelzorg: ondersteuning voor de aidant' },
    { id: '9', title: '9. Résidence autonomie: zelfstandig wonen met diensten' },
    { id: '10', title: '10. Résidence services seniors: commercieel alternatief' },
    { id: '11', title: '11. Accueil familial: wonen bij een gastgezin' },
    { id: '12', title: '12. EHPAD: wanneer, hoe kiezen, wat verwachten' },
    { id: '13', title: '13. Wanneer wordt terugkeer naar Nederland onverstandig of onmogelijk?' },
    { id: '14', title: '14. De Wlz-wachttijd bij remigratie' },
    { id: '15', title: '15. Verwijzing naar het remigratiedossier' },
    { id: '16', title: '16. Personne de confiance: medische vertrouwenspersoon' },
    { id: '17', title: '17. Directives anticipées: wilsverklaring medische behandeling' },
    { id: '18', title: '18. Mandat de protection future: volmacht voor later' },
    { id: '19', title: '19. Habilitation familiale, tutelle, curatelle' },
    { id: '20', title: '20. Palliatieve zorg in Frankrijk' },
    { id: '21', title: '21. Sédation profonde (Claeys-Leonetti)' },
    { id: '22', title: '22. Praktische zaken bij overlijden' },
    { id: '23', title: '23. Wat kost ouderenzorg in Frankrijk?' },
    { id: '24', title: '24. APA: bedragen, eigen bijdrage, aanvraag' },
    { id: '25', title: '25. ASH: sociale bijstand voor EHPAD' },
    { id: '26', title: "26. Crédit d'impôt: 50% terug via belasting" },
    { id: '27', title: '27. ASPA: minimuminkomen voor 65+' },
    { id: '28', title: '28. Rekenvoorbeeld' },
    { id: '29', title: '29. Checklist per fase' },
    { id: '30', title: '30. Hulplijnen en officiële bronnen' },
  ];
  
  var DOSSIER_TITLE = 'Ouder worden in Frankrijk';
  var DOSSIER_SLUG = 'ouderenzorg-frankrijk';
  
  function $(s) { return document.querySelector(s); }
  function $$(s) { return document.querySelectorAll(s); }
  
  // ===== ABONNEE CHECK =====
  function isSubscriber() {
    var root = $('.ifr-ozg');
    return root && root.getAttribute('data-ifr-member') === '1';
  }
  
  // ===== TOAST =====
  function showToast(msg) {
    var t = $('#ifr-ozg-toast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('ifr-ozg-visible');
    setTimeout(function() { t.classList.remove('ifr-ozg-visible'); }, 3000);
  }
  
  // ===== POPOVER =====
  function showPopover(action) {
    var overlay = $('#ifr-ozg-popover-overlay');
    var popover = $('#ifr-ozg-popover');
    var textEl = $('#ifr-ozg-popover-text');
    
    if (action === 'save-section') {
      textEl.textContent = 'Sla deze sectie op in uw persoonlijke dossier zodat u hem later kunt terugvinden.';
    } else if (action === 'save-dossier') {
      textEl.textContent = 'Sla het volledige dossier op in uw persoonlijke DossierFrankrijk, zodat u het later kunt raadplegen.';
    } else if (action === 'download-pdf') {
      textEl.textContent = 'Download het dossier als overzichtelijke PDF — om offline door te nemen, uit te printen, of te delen.';
    } else {
      textEl.textContent = 'Deze functie is beschikbaar voor abonnees van Infofrankrijk.';
    }
    
    if (overlay) overlay.classList.add('ifr-ozg-visible');
    if (popover) popover.classList.add('ifr-ozg-visible');
  }
  
  function hidePopover() {
    var o = $('#ifr-ozg-popover-overlay');
    var p = $('#ifr-ozg-popover');
    if (o) o.classList.remove('ifr-ozg-visible');
    if (p) p.classList.remove('ifr-ozg-visible');
  }
  
  // ===== DOSSIERFRANKRIJK: SECTIE OPSLAAN =====
  function saveSectionToDossier(sectionId) {
    var section = document.querySelector('[data-ifr-id="' + sectionId + '"]');
    if (!section) return;
    
    var h2 = section.querySelector('h2');
    var sectionTitle = h2 ? h2.textContent : 'Sectie ' + sectionId;
    var articleTitle = document.title || DOSSIER_TITLE;
    
    var parts = [];
    section.querySelectorAll('p, li, h3, h4').forEach(function(el) {
      var txt = (el.innerText || el.textContent || '').trim();
      if (!txt) return;
      if (el.tagName === 'H3' || el.tagName === 'H4') parts.push('### ' + txt);
      else if (el.tagName === 'LI') parts.push('• ' + txt);
      else parts.push(txt);
    });
    
    parts.push('');
    parts.push('---');
    parts.push('Bron: ' + articleTitle);
    parts.push(window.location.href + '#ifr-ozg-sectie-' + sectionId);
    
    var params = new URLSearchParams();
    params.set('titel', sectionTitle.substring(0, 250));
    params.set('inhoud', parts.join('\n\n').substring(0, 5000));
    params.set('source', DOSSIER_SLUG);
    
    window.open('https://dossierfrankrijk.nl/nieuw?' + params.toString(), '_blank');
    showToast('✓ Doorgestuurd naar DossierFrankrijk');
  }
  
  // ===== DOSSIERFRANKRIJK: HEEL DOSSIER OPSLAAN =====
  function saveDossierToDossier() {
    var articleTitle = document.title || DOSSIER_TITLE;
    var parts = [];
    
    parts.push('# ' + DOSSIER_TITLE);
    parts.push('');
    parts.push('Opgeslagen op: ' + new Date().toLocaleDateString('nl-NL'));
    parts.push('');
    
    $$('.ifr-ozg-section').forEach(function(section) {
      var h2 = section.querySelector('h2');
      if (h2) parts.push('## ' + h2.textContent);
      
      section.querySelectorAll('p, li, h3, h4').forEach(function(el) {
        var txt = (el.innerText || el.textContent || '').trim();
        if (!txt) return;
        if (el.tagName === 'H3' || el.tagName === 'H4') parts.push('### ' + txt);
        else if (el.tagName === 'LI') parts.push('• ' + txt);
        else parts.push(txt);
      });
      parts.push('');
    });
    
    parts.push('---');
    parts.push('Bron: ' + articleTitle);
    parts.push(window.location.href);
    
    var params = new URLSearchParams();
    params.set('titel', (DOSSIER_TITLE + ' — volledig dossier').substring(0, 250));
    params.set('inhoud', parts.join('\n\n').substring(0, 10000));
    params.set('source', DOSSIER_SLUG);
    
    window.open('https://dossierfrankrijk.nl/nieuw?' + params.toString(), '_blank');
    showToast('✓ Doorgestuurd naar DossierFrankrijk');
  }
  
  // ===== PDF DOWNLOAD =====
  function downloadAsPdf() {
    if (!window.jspdf || !window.jspdf.jsPDF) {
      showToast('⚠ PDF-bibliotheek niet geladen');
      return;
    }
    
    var doc = new window.jspdf.jsPDF({ unit: 'mm', format: 'a4' });
    var pageWidth = 210, pageHeight = 297, margin = 20;
    var maxWidth = pageWidth - 2 * margin;
    var y = margin;
    
    // Titel
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.setTextColor(128, 0, 0);
    doc.text(DOSSIER_TITLE, margin, y);
    y += 10;
    
    // Subtitel
    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(80, 80, 80);
    doc.text('Het complete dossier voor Nederlandstaligen in Frankrijk', margin, y);
    y += 6;
    doc.setFontSize(9);
    doc.text('Bron: infofrankrijk.com — ' + new Date().toLocaleDateString('nl-NL'), margin, y);
    y += 10;
    
    // Lijn
    doc.setDrawColor(128, 0, 0);
    doc.line(margin, y, pageWidth - margin, y);
    y += 8;
    
    // Secties
    $$('.ifr-ozg-section').forEach(function(section) {
      var h2 = section.querySelector('h2');
      if (!h2) return;
      
      // Nieuwe pagina indien nodig
      if (y > pageHeight - 40) {
        doc.addPage();
        y = margin;
      }
      
      // Sectie titel
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(13);
      doc.setTextColor(128, 0, 0);
      var titleLines = doc.splitTextToSize(h2.textContent, maxWidth);
      doc.text(titleLines, margin, y);
      y += titleLines.length * 6 + 3;
      
      // Sectie inhoud
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(50, 50, 50);
      
      var paragraphs = [];
      section.querySelectorAll('p, li, h3, h4').forEach(function(el) {
        var txt = (el.innerText || el.textContent || '').trim();
        if (txt) {
          if (el.tagName === 'H3' || el.tagName === 'H4') {
            paragraphs.push('\n' + txt.toUpperCase());
          } else if (el.tagName === 'LI') {
            paragraphs.push('• ' + txt);
          } else {
            paragraphs.push(txt);
          }
        }
      });
      
      paragraphs.forEach(function(p) {
        var lines = doc.splitTextToSize(p, maxWidth);
        lines.forEach(function(line) {
          if (y > pageHeight - margin) {
            doc.addPage();
            y = margin;
          }
          doc.text(line, margin, y);
          y += 5;
        });
        y += 1;
      });
      
      y += 5;
    });
    
    // Paginanummers
    var pageCount = doc.internal.getNumberOfPages();
    for (var i = 1; i <= pageCount; i++) {
      doc.setPage(i);
      doc.setFontSize(8);
      doc.setTextColor(150, 150, 150);
      doc.text(
        'Infofrankrijk.com — ' + DOSSIER_TITLE + ' — pagina ' + i + ' van ' + pageCount,
        pageWidth / 2,
        pageHeight - 10,
        { align: 'center' }
      );
    }
    
    doc.save('ouderenzorg-in-frankrijk-dossier.pdf');
    showToast('✓ PDF gedownload');
  }
  
  // ===== TOP ACTIES RENDEREN =====
  function renderTopActions() {
    var container = $('#ifr-ozg-top-actions');
    var cta = $('#ifr-ozg-cta');
    if (!container) return;
    
    var isMember = isSubscriber();
    var lockAttr = isMember ? '' : ' data-ifr-locked="1"';
    var tipSave = isMember ? '' : ' data-ifr-tooltip="Abonnees kunnen dossier opslaan"';
    var tipPdf = isMember ? '' : ' data-ifr-tooltip="Abonnees kunnen PDF downloaden"';
    
    container.innerHTML =
      '<button type="button" class="ifr-ozg-premium-btn" data-ifr-action="save-dossier"' + lockAttr + tipSave + '>' +
        '<span class="ifr-ozg-premium-btn-icon">📁</span>Opslaan in DossierFrankrijk' +
      '</button>' +
      '<button type="button" class="ifr-ozg-premium-btn" data-ifr-action="download-pdf"' + lockAttr + tipPdf + '>' +
        '<span class="ifr-ozg-premium-btn-icon">📄</span>Download als PDF' +
      '</button>';
    
    // CTA tonen voor niet-abonnees
    if (cta) cta.style.display = isMember ? 'none' : 'block';
    
    // Event listeners
    container.querySelectorAll('[data-ifr-action]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var action = this.getAttribute('data-ifr-action');
        if (!isSubscriber()) {
          showPopover(action);
          return;
        }
        if (action === 'save-dossier') saveDossierToDossier();
        if (action === 'download-pdf') downloadAsPdf();
      });
    });
  }
  
  // ===== SECTIE TITEL OPZOEKEN =====
  function getSectionTitle(sectionId) {
    for (var i = 0; i < SECTIONS.length; i++) {
      if (SECTIONS[i].id === String(sectionId)) return SECTIONS[i].title;
    }
    return 'sectie ' + sectionId;
  }
  
  // ===== NAV: SCROLL NAAR INHOUDSOPGAVE =====
  function scrollToToc() {
    var toc = $('#ifr-ozg-toc');
    if (toc) toc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  // ===== NAV: SCROLL NAAR SECTIE =====
  function scrollToSection(sectionId) {
    var el = $('#ifr-ozg-sectie-' + sectionId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  // ===== NAV: STEL VRAAG VANUIT SECTIE =====
  function askAssistantAboutSection(sectionId) {
    var title = getSectionTitle(sectionId);
    
    // Onthoud waar de gebruiker was — overleeft tab-refresh
    try {
      sessionStorage.setItem('ozg-last-section', sectionId);
      sessionStorage.setItem('ozg-last-section-title', title);
    } catch(e) { /* sessionStorage kan disabled zijn — niet fataal */ }
    
    // Scroll naar de embed-iframe
    var assistant = $('#ifr-ozg-assistant');
    if (assistant) assistant.scrollIntoView({ behavior: 'smooth', block: 'start' });
    
    // Stuur context naar iframe (kan in 't niets gaan tot embed-pagina bestaat)
    var iframe = assistant && assistant.querySelector('iframe');
    if (iframe && iframe.contentWindow) {
      try {
        iframe.contentWindow.postMessage({
          type: 'ozg-context-update',
          section: sectionId,
          sectionTitle: title
        }, 'https://dossierfrankrijk.nl');
      } catch(e) { /* iframe niet klaar of cross-origin nog niet ingericht */ }
    }
  }
  
  // ===== INTERSECTION OBSERVER: HUIDIGE SECTIE TRACKEN =====
  function initSectionObserver() {
    if (!('IntersectionObserver' in window)) return;
    
    var sections = $$('section.ifr-ozg-section');
    if (!sections.length) return;
    
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && entry.intersectionRatio >= 0.4) {
          var sid = entry.target.getAttribute('data-ifr-id');
          if (sid) {
            try {
              sessionStorage.setItem('ozg-current-section', sid);
              sessionStorage.setItem('ozg-current-section-title', getSectionTitle(sid));
            } catch(e) { /* niet fataal */ }
          }
        }
      });
    }, {
      threshold: [0.4],
      rootMargin: '-10% 0px -40% 0px'
    });
    
    sections.forEach(function(s) { observer.observe(s); });
  }
  
  // ===== POSTMESSAGE LISTENER: IFRAME → PARENT =====
  function initIframeMessageListener() {
    window.addEventListener('message', function(event) {
      // Accepteer alleen berichten van de embed-origin
      if (event.origin !== 'https://dossierfrankrijk.nl') return;
      
      var data = event.data;
      if (!data || typeof data !== 'object') return;
      
      // Iframe vraagt om navigatie naar een sectie
      if (data.type === 'ozg-navigate-to-section' && data.section) {
        scrollToSection(data.section);
      }
      
      // Iframe vraagt om huidige sectie (voor "terug naar..." als gebruiker
      // gewoon naar onderen scrolde zonder op een knop te klikken)
      if (data.type === 'ozg-request-current-section') {
        var iframe = $('#ifr-ozg-assistant iframe');
        if (iframe && iframe.contentWindow) {
          var sid = '';
          var title = '';
          try {
            sid = sessionStorage.getItem('ozg-current-section') || '';
            title = sessionStorage.getItem('ozg-current-section-title') || '';
          } catch(e) {}
          
          try {
            iframe.contentWindow.postMessage({
              type: 'ozg-context-update',
              section: sid,
              sectionTitle: title
            }, 'https://dossierfrankrijk.nl');
          } catch(e) {}
        }
      }
    });
  }
  
  // ===== SECTIE ACTIES INJECTEREN =====
  function injectSectionActions() {
    var isMember = isSubscriber();
    
    $$('.ifr-ozg-section-actions').forEach(function(container) {
      var sectionId = container.getAttribute('data-ifr-section');
      if (!sectionId) return;
      
      var lockAttr = isMember ? '' : ' data-ifr-locked="1"';
      var tip = isMember ? '' : ' data-ifr-tooltip="Abonnees kunnen sectie opslaan"';
      
      container.innerHTML =
        '<button type="button" class="ifr-ozg-nav-btn" data-ifr-action="back-to-toc" data-ifr-section="' + sectionId + '">' +
          '<span class="ifr-ozg-nav-btn-icon">↑</span>Terug naar index' +
        '</button>' +
        '<button type="button" class="ifr-ozg-nav-btn" data-ifr-action="ask-assistant" data-ifr-section="' + sectionId + '">' +
          '<span class="ifr-ozg-nav-btn-icon">💬</span>Stel een vraag' +
        '</button>' +
        '<button type="button" class="ifr-ozg-premium-btn" data-ifr-action="save-section" data-ifr-section="' + sectionId + '"' + lockAttr + tip + '>' +
          '<span class="ifr-ozg-premium-btn-icon">📁</span>Bewaar deze sectie' +
        '</button>';
      
      // Back-to-toc handler
      var tocBtn = container.querySelector('[data-ifr-action="back-to-toc"]');
      tocBtn.addEventListener('click', function() {
        scrollToToc();
      });
      
      // Ask-assistant handler
      var askBtn = container.querySelector('[data-ifr-action="ask-assistant"]');
      askBtn.addEventListener('click', function() {
        var sid = this.getAttribute('data-ifr-section');
        askAssistantAboutSection(sid);
      });
      
      // Save-section handler (existing)
      var saveBtn = container.querySelector('[data-ifr-action="save-section"]');
      saveBtn.addEventListener('click', function() {
        var sid = this.getAttribute('data-ifr-section');
        if (!isSubscriber()) {
          showPopover('save-section');
          return;
        }
        saveSectionToDossier(sid);
      });
    });
  }
  
  // ===== POPOVER SLUITERS =====
  function initPopover() {
    var overlay = $('#ifr-ozg-popover-overlay');
    var closeBtn = $('#ifr-ozg-popover-close');
    
    if (overlay) overlay.addEventListener('click', hidePopover);
    if (closeBtn) closeBtn.addEventListener('click', hidePopover);
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') hidePopover();
    });
  }
  
  // ===== INIT =====
  function init() {
    renderTopActions();
    injectSectionActions();
    initPopover();
    initSectionObserver();
    initIframeMessageListener();
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
